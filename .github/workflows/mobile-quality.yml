name: Mobile quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  mobile-quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint mobile workspace
        run: npm run lint:mobile

      - name: Typecheck mobile workspace
        run: npm run typecheck:mobile

      - name: Test mobile workspace
        run: npm run test:mobile
